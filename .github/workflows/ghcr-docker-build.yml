# Build QwenPaw Docker image and push to GitHub Container Registry (ghcr.io)
# Triggered on push to main/master branch and on tags.
name: Build and Push to GHCR

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v1.2.3)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # Image name: ghcr.io/<owner>/<repo> (lowercase)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On push to main: tag as "latest" and short SHA
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            # On tag push: use the tag name (e.g. v1.2.3)
            type=ref,event=tag
            # Manual workflow_dispatch input
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            QWENPAW_DISABLED_CHANNELS=imessage
          cache-from: type=gha
          cache-to: type=gha,mode=max
